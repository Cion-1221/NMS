server:
  port: 8080
  # 受信反向代理列表（可省略，默认只信任本机回环）：只有来自这些地址（单 IP 或
  # CIDR）的连接，其 X-Forwarded-For 头才会被采信为客户端真实 IP——防止伪造 XFF
  # 绕过登录防爆破。Nginx/LB 与后端不在同一台机器时，把它的内网地址加进来。
  trusted_proxies:
    - "127.0.0.1"
    - "::1"
    # - "10.0.0.5"        # 异机 Nginx/LB 的内网地址示例

database:
  host: "127.0.0.1"
  port: 3306
  user: "nms_user"
  password: "CHANGE_ME"
  dbname: "nms_db"
  # ── 连接池（以下 4 项可省略，省略时使用所示默认值）─────────────────────────
  # 最大并发连接数
  max_open_conns: 25
  # 最大空闲连接数
  max_idle_conns: 10
  # 连接最长存活时间（分钟）；必须小于 MySQL wait_timeout（默认 480 分钟），
  # 否则空闲连接被服务端关闭后下一个请求会拿到死连接
  conn_max_lifetime_minutes: 60
  # 空闲连接最长保留时间（分钟）
  conn_max_idle_time_minutes: 10

jwt:
  # ⚠️ 生产部署前必须替换为强随机字符串（至少 32 位），切勿泄露
  secret: "CHANGE_ME_TO_A_RANDOM_SECRET_STRING_AT_LEAST_32_CHARS"
  # Refresh Token 有效期（天），0 = 使用默认值 7 天
  refresh_token_days: 7

# ASN 查询：MTR 逐跳 ASN 标注功能（整个 asndb 块可省略，省略时使用下列默认值）
asndb:
  # 是否启用 ASN 查询功能；关闭后不注册 /api/v1/asn 等路由，对其他功能无影响
  enabled: false
  # 数据文件路径（支持绝对路径）
  v4_prefix_file: "data/asndb/pfx2as_v4.txt"
  v6_prefix_file: "data/asndb/pfx2as_v6.txt"
  names_file:     "data/asndb/asnames.txt"
  # 每天几点执行自动下载更新（0–23，服务器本地时间）；建议选低峰时段
  # CAIDA 数据约 400MB（解压后），RIPE 数据约 5MB
  update_hour: 3
  #
  # 数据来源（固定 URL，无需修改）：
  #   IPv4 前缀 → CAIDA RouteViews (routeviews-rv2-YYYYMMDD-1200.pfx2as.gz)
  #   IPv6 前缀 → CAIDA RouteViews6 (routeviews-rv6-YYYYMMDD-1200.pfx2as.gz)
  #   ASN 名称  → RIPE NCC (https://ftp.ripe.net/ripe/asnames/asn.txt)
  #
  # 手动触发下载（无需重启服务）：
  #   POST /api/v1/admin/asndb/download  （需管理员 JWT）
  # 手动重载已有文件（覆盖文件后调用）：
  #   POST /api/v1/admin/asndb/reload    （需管理员 JWT）

# 审计日志 / 探测结果分层保留策略（可省略，省略时使用所示默认值且不启用归档）
audit:
  # IPAM / Devices / Agent / System 审计日志自动保留天数，超期每日自动清理；0 = 永久保留
  max_age_days: 180

  # ── 探测结果分层保留（Cacti RRA 风格）────────────────────────────────────────
  # 原始探测点（粒度 = Probe Config 的 Interval，如 300s 任务 = 5 分钟/点）。
  # 启用下方 probe_rollups 归档后建议缩短（推荐 14），长期数据由归档层接力；
  # 未启用归档时保持较长（默认 30）；0 = 永久保留
  probe_results_max_age_days: 30
  # 路径类结果（mtr/meshmtr/traceroute，detail 为大 JSON、仅消费最新快照）独立保留
  # 天数；0 = 跟随 probe_results_max_age_days。启用归档并延长标量数据时建议单独设短
  path_results_max_age_days: 0

  # 降采样归档层（推荐配置，取消注释即启用）：后台任务每小时把原始点聚合到各层
  # （均值/最值/丢包），各层独立保留；延迟趋势图按时间范围自动选择最细可用数据源。
  # 注意：归档只能从启用后开始积累，历史已清理的数据无法追溯。
  # 各层 bucket_minutes 必须严格递增；启用归档时 probe_results_max_age_days 需
  # ≥ 最大桶的 2 倍天数 + 2（如含 1 天桶则至少 4 天）。
  # probe_rollups:
  #   - bucket_minutes: 5        # 5 分钟均值
  #     max_age_days: 183        #   保留 6 个月
  #   - bucket_minutes: 30       # 30 分钟均值
  #     max_age_days: 366        #   保留 12 个月
  #   - bucket_minutes: 120      # 2 小时均值
  #     max_age_days: 1096       #   保留 3 年
  #   - bucket_minutes: 1440     # 1 天均值
  #     max_age_days: 3660       #   保留 10 年

  # 磁盘空间兜底（整个块可省略，默认关闭）：常规保留任务 24 小时才跑一次，磁盘
  # 较小的部署可能来不及反应（2026-07-23 事故：9.2G 小盘几小时内被 probe_results
  # 打满，MariaDB 因无法分配 InnoDB 临时表空间而崩溃）。生产环境磁盘通常远大于
  # 这个量级，默认不开启；测试机/小型 VPS 建议开启。
  probe_disk_guard:
    enabled: false
    check_interval_minutes: 10   # 检查可用磁盘空间的频率
    critical_free_mb: 500        # 可用空间低于此值（MB）触发对 probe_results 的紧急清理
                                  # （比 probe_results_max_age_days 更激进，但不会砍破
                                  # probe_rollups 归档层要求的最小原始点天数）

# SNMP 设备采集（整个 snmp 块可省略，省略时使用下列默认值）
# 设备在 Devices 页逐台开启：采集模式 Direct（Server 直连）或 Agent Proxy（探针代理）。
# 采集内容为 RFC 1213 system 组（sysUpTime/sysName/sysDescr/sysLocation/sysContact），
# 结论驱动设备"运行状态"（up/down/unknown）；管理状态（active/maintenance/planned）
# 仍由用户设置，两者独立。
snmp:
  # 总开关：关闭后不启动 Direct 轮询器与运行状态看门狗，也不向 Agent 下发 snmp_poll 任务
  enabled: true
  # 快轮询默认间隔（秒）：每次只采 sysUpTime（报文最小化，兼做存活判定）。
  # 设备表单里可逐台覆盖（10–86400）
  default_interval_seconds: 60
  # 每 N 次快轮询附带一次完整 system 组采集（资产信息变化很慢，无需每轮都取）
  inventory_every_n: 10
  # 单次 SNMP 请求超时（秒）与重试次数（总请求数 = 1 + retries）
  timeout_seconds: 3
  retries: 1
  # Direct 模式内置轮询器的并发上限（同一时刻在途的 SNMP 请求数）
  max_concurrent: 16
  # 自定义 OID 指标时序保留天数（gauge 原值 / counter 每秒速率），0 = 永久。
  # 数据量估算：每设备每 OID 每周期 1 行——16 OID × 60s 周期 ≈ 2.3 万行/天/设备
  metrics_max_age_days: 14
  # 指标降采样归档层（Cacti RRA 风格，同 audit.probe_rollups；取消注释即启用）：
  # 后台任务每小时把原始点聚合到各层，趋势图按时间范围自动选源，长窗口曲线不断档。
  # 各层 bucket_minutes 必须严格递增；启用后 metrics_max_age_days 需 ≥ 最大桶天数×2+2
  # metric_rollups:
  #   - bucket_minutes: 5        # 5 分钟均值
  #     max_age_days: 90         #   保留 3 个月
  #   - bucket_minutes: 60       # 1 小时均值
  #     max_age_days: 366        #   保留 12 个月
  #   - bucket_minutes: 1440     # 1 天均值
  #     max_age_days: 1096       #   保留 3 年
  # MIB 文件库存储目录（Devices → MIBs Tab 上传的文件；建议纳入备份，不进版本控制）
  mibs_dir: "data/mibs"
  # SNMP 凭证静态加密口令（community / SNMPv3 口令的 encryption at rest）。
  # 留空 = 明文存库（凭证本就永不出现在任何 API 响应中）；配置任意强随机字符串后，
  # 启动时自动加密存量明文凭证，此后写入一律密文（AES-256-GCM）。
  # ⚠️ 口令务必纳入备份：全部丢失后已加密凭证不可恢复，只能逐台重新录入
  credentials_key: ""
  # 密钥轮换：把 credentials_key 换成新口令、旧口令填到这里，重启后启动清扫自动把
  # 全部凭证重封为新密钥（读路径过渡期两把钥都认），之后即可清空此项
  credentials_key_previous: ""

# Agent PKI：内置 CA + mTLS 自动引导注册体系（整个 agent_pki 块可省略，省略时使用下列默认值）
agent_pki:
  # 是否启用 Agent 体系；关闭后不会生成 CA，也不会监听 enroll/sync 两个端口
  enabled: true
  # Root CA + 证书存储目录（持久化，跨重启复用；删除等同于让所有已注册 Agent 失效）
  dir: "data/pki"
  # Agent 二进制上传存储目录（Release 版本下发功能）；建议纳入备份，不要纳入版本控制
  releases_dir: "data/releases"
  # Agent 首次注册引导端口（单向 HTTPS，不要求客户端证书）
  enroll_port: 8443
  # Agent 任务拉取 / 结果上报端口（强制 mTLS，要求客户端证书）
  sync_port: 8444
  # ⚠️ 服务端证书 SAN 列表：必须覆盖 Agent 实际拨号使用的主机名/IP，否则 Agent 侧 TLS 校验会失败
  # enroll/sync 监听地址本身是双栈的（IPv4+IPv6 都能连上），按需同时列出 v4/v6：
  server_san:
    - "localhost"
    - "127.0.0.1"
    - "::1"
    # - "203.0.113.10"          # 生产环境：服务器的公网/内网 IPv4
    # - "2001:db8::1"           # 生产环境：服务器的公网/内网 IPv6
  # 签发给 Agent 的客户端证书有效期（天）
  client_cert_days: 365
  # enroll/sync 端口服务端叶子证书有效期（天）；每次启动重新签发，无需手工轮换
  server_cert_days: 730
  # Root CA 有效期（天）；首次启动生成后长期复用，到期前需手工规划轮换
  ca_cert_days: 3650

# 日志：按天轮转，文件名 nms-server-YYYY-MM-DD.log（整个 log 块可省略，省略时使用下列默认值）
log:
  # 日志存储目录（支持绝对路径，如 /var/log/nms）
  dir: "logs"
  # 保留最近 N 天的日志文件，0 = 不限制
  max_age_days: 30
  # 最多保留 N 个旧文件，与 max_age_days 双重保障，0 = 不限制
  max_backups: 30
  # 是否 gzip 压缩历史日志文件（后台异步执行，不阻塞业务）
  compress: true
  # 最低记录级别: debug | info | warn | error
  level: "info"
  # 日志格式: json（适合 ELK/Loki 采集） | text（适合直接 grep）
  format: "json"
  # 是否同时输出到标准输出（Docker / systemd journald 环境推荐开启）
  stdout: false
  # 是否记录 HTTP 请求访问日志；部署在 Nginx/LB 后且已有访问日志采集时可关闭
  access_log: true
