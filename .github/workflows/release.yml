name: Build and Release NMS

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build frontend and backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 前端构建 ────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build
          tar -czf ../dist.tar.gz dist

      # ── 后端构建 ────────────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Build backend
        working-directory: ./backend
        run: |
          go mod tidy
          go test ./...
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ../nms-server main.go

      # ── 发布 Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist.tar.gz
            nms-server
          body: |
            ## 部署说明

            | 文件 | 说明 |
            |------|------|
            | `nms-server` | Linux amd64 后端二进制（含认证/IPAM/System 模块） |
            | `dist.tar.gz` | 前端静态资源压缩包，解压后交由 Nginx 托管 |

            **默认账号：** `admin` / `admin`（首次登录强制修改密码）

            详细部署步骤请参阅 [README.md](https://github.com/${{ github.repository }}/blob/main/README.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
