name: Build and Release NMS

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build frontend and backend
    runs-on: ubuntu-latest
    # Opt into Node.js 24 for all action runtimes before GitHub forces it on 2026-09-16.
    # (actions/checkout@v4 and actions/setup-node@v4 still ship with a Node 20 runtime;
    # this variable upgrades them without requiring a major action version bump.)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 👈 极其重要：必须拉取完整的 Git 历史，否则找不到上一个 Tag

      # ── 前端构建 ────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build
          tar -czf ../dist.tar.gz dist

      # ── 后端构建 ────────────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Build backend
        working-directory: ./backend
        run: |
          go mod tidy
          go test ./...
          # 必须编译整个包（.）而不是单个文件（main.go），
          # 否则 package main 中的其他源文件（如 logger.go）不会参与编译
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ../nms-server .

      # ── 自动动态提取 Commit 历史 ─────────────────────────────────────────────
      - name: Generate Custom Changelog
        id: changelog
        run: |
          echo "CHANGELOG_TEXT<<EOF" >> $GITHUB_ENV
          # 检查是否存在上一个 Tag，如果存在就提取两个 Tag 之间的所有单个 commit 记录
          if git describe --tags --abbrev=0 HEAD^ >/dev/null 2>&1; then
            LAST_TAG=$(git describe --tags --abbrev=0 HEAD^)
            git log ${LAST_TAG}..HEAD --oneline --pretty=format:"* %s (%h)" >> $GITHUB_ENV
          else
            # 如果是第一次发版找不到前任 Tag，则兜底打印最近 10 条 commit
            git log -n 10 --oneline --pretty=format:"* %s (%h)" >> $GITHUB_ENV
          fi
          echo "" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ── 发布 Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false # 👈 关闭 GitHub 自带的鸡肋对比页
          files: |
            dist.tar.gz
            nms-server
          body: |
            ## 📥 部署说明

            | 文件 | 说明 |
            |------|------|
            | `nms-server` | Linux amd64 后端二进制（含认证/IPAM/Devices/System 模块） |
            | `dist.tar.gz` | 前端静态资源压缩包，解压后交由 Nginx 或 Caddy 托管 |

            **默认账号：** `admin` / `admin`（首次登录强制修改密码）

            详细部署步骤请参阅 [README.md](https://github.com/${{ github.repository }}/blob/main/README.md)
            
            ---
            ## 🚀 本次更新内容 (Changelog)
            ${{ env.CHANGELOG_TEXT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}